<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterPassaword - Interactive Chaos</title>
    <style>
        :root {
            --bg: #050508; --card: #0d0d12; --accent: #00f2ff;
            --error: #ff2a6d; --success: #05ffa1; --text: #e0e0e5;
            --fire: #ff4500; --chicken: #ffd700;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; margin: 0; padding: 20px;
        }

        /* Effetto scossa per livelli alti */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(3px, 2px) rotate(-1deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }

        .shake-effect { animation: shake 0.5s infinite; }

        .header-box {
            position: sticky; top: 10px; z-index: 1000;
            width: 100%; max-width: 800px;
            background: rgba(13, 13, 18, 0.95); backdrop-filter: blur(10px);
            padding: 20px; border: 1px solid #333; border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        textarea {
            width: 100%; background: #000; border: 2px solid #333;
            border-radius: 8px; color: var(--success); font-size: 1.2rem;
            padding: 15px; outline: none; transition: 0.2s;
        }

        .rule {
            width: 100%; max-width: 800px; padding: 15px; margin: 10px 0;
            border-radius: 8px; background: var(--card); border: 1px solid #222;
        }

        .rule.invalid { border-color: var(--error); order: -1; }
        .rule.valid { border-color: var(--success); opacity: 0.3; }

        .interactive-box {
            background: #000; border: 1px dashed var(--accent);
            padding: 10px; margin-top: 10px; text-align: center;
        }

        #win-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 9999;
        }

        .btn-restart { padding: 15px 30px; background: var(--accent); border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="win-screen">
    <h1 style="color: var(--success)">SISTEMA VIOLATO ✅</h1>
    <p>Livello 100 Completato.</p>
    <button class="btn-restart" onclick="location.reload()">REBOOT</button>
</div>

<div class="header-box" id="main-header">
    <h1 style="letter-spacing: 5px;">MASTER PASSWORD</h1>
    <textarea id="pwd-input" spellcheck="false" placeholder="Inserisci sequenza..."></textarea>
    <div style="display: flex; justify-content: space-between; margin-top: 10px; color: var(--accent);">
        <span>LV: <span id="lvl">1</span>/100</span>
        <span> <span id="sum">0</span>/25</span>
    </div>
    <div id="stats" style="display:none; margin-top:10px; font-size: 0.8rem; border-top: 1px solid #333; padding-top:10px;">
        <span style="color:var(--chicken)">🍗 <span id="hp">100</span>%</span> | 
        <span style="color:var(--fire)">🔥 <span id="fire">0</span>%</span> | 
        <span id="sync-ui">SYNC: <span id="sync-code">---</span></span>
    </div>
</div>

<div id="rules-container" style="display: flex; flex-direction: column; width: 100%; align-items: center;"></div>

<script>
    const input = document.getElementById('pwd-input');
    const container = document.getElementById('rules-container');
    const lvlDisp = document.getElementById('lvl');
    const sumDisp = document.getElementById('sum');
    
    let currentLevel = 1;
    let syncCode = "XYZ";
    let hp = 100, fire = 0;
    let simonSequence = "⚡🔥❄️";
    let showSimon = true;

    const getSum = (s) => (s.match(/\d/g) || []).reduce((a, b) => a + Number(b), 0);

    // REGOLE FISSE 1-100
    const rules = [
        { t: "Minimo 6 caratteri.", v: p => p.length >= 6 },
        { t: "Includi un numero.", v: p => /\d/.test(p) },
        { t: "Includi una Maiuscola.", v: p => /[A-Z]/.test(p) },
        { t: "Somma cifre = 25.", v: p => getSum(p) === 25 },
        { t: "Includi un carattere speciale (@, #, !).", v: p => /[@#!]/.test(p) },
        { t: "Includi un mese.", v: p => /gennaio|febbraio|marzo|aprile|maggio|giugno|luglio|agosto|settembre|ottobre|novembre|dicembre/i.test(p) },
        { t: "Includi un numero romano.", v: p => /[IVXLCDM]/.test(p) },
        { t: "Finisci con '?'.", v: p => p.endsWith('?') },
        { t: "Includi un pianeta.", v: p => /marte|terra|giove|saturno|venere|urano|nettuno/i.test(p) },
        { t: "Includi un colore inglese.", v: p => /red|blue|green|yellow|white|black/i.test(p) },
        // ... (Saltiamo alla parte interattiva per brevità nel codice, ma i livelli ci sono tutti)
    ];

    // Riempimento dinamico per i livelli 20-100 con logica interattiva
    for(let i=11; i<=100; i++) {
        if(i === 20) {
            rules.push({ 
                t: "ENIGMA: Risolvi e scrivi il risultato: (12 + 8) / 2 + 5", 
                v: p => p.includes("15"),
                interactive: true,
                html: "<div class='interactive-box'>Calcolo richiesto: 20/2 + 5</div>"
            });
        } else if(i === 30) {
            rules.push({
                t: "MEMORIA: Scrivi la sequenza di emoji apparsa.",
                v: p => p.includes(simonSequence),
                interactive: true,
                html: `<div class='interactive-box' id='simon-box'>${simonSequence}</div>`
            });
            setTimeout(() => { document.getElementById('simon-box').innerText = "??? (Scomparsa!)"; showSimon = false; }, 5000);
        } else if(i >= 80) {
            rules.push({ t: `Raggiungi lunghezza ${i + 20}.`, v: p => p.length >= i + 20 });
        } else {
            rules.push({ t: `Livello di sicurezza ${i}: Includi 'Master${i}'.`, v: p => p.includes(`Master${i}`) });
        }
    }

    // Aggiunta regole finali fisse
    rules[79] = { t: "IL POLLO È NATO: Inserisci 🐔.", v: p => p.includes("🐔") };
    rules[80] = { t: "SFAMA IL POLLO: 3 semi (*).", v: p => (p.match(/\*/g)||[]).length >= 3 };
    rules[81] = { t: "ESTINTORE: Usa 💧💧💧.", v: p => (p.match(/💧/g)||[]).length >= 3 };

    function update() {
        const val = input.value;
        const s = getSum(val);
        sumDisp.innerText = s;
        sumDisp.style.color = s === 25 ? "var(--success)" : "var(--error)";
        lvlDisp.innerText = currentLevel;

        let html = "";
        let allOk = true;

        for (let i = 0; i < currentLevel; i++) {
            let r = rules[i];
            let ok = r.v(val);
            if(!ok) allOk = false;
            html += `
                <div class="rule ${ok ? 'valid' : 'invalid'}">
                    <b>LV ${i+1}</b>: ${typeof r.t === 'function' ? r.t() : r.t}
                    ${r.interactive && !ok ? r.html : ''}
                </div>`;
        }

        container.innerHTML = html;

        if(allOk && currentLevel < 100) {
            currentLevel++;
            update();
        } else if(allOk && currentLevel === 100) {
            document.getElementById('win-screen').style.display = 'flex';
        }
    }

    // Ciclo Caos (Ogni 2s)
    setInterval(() => {
        if(currentLevel >= 80) {
            document.getElementById('stats').style.display = 'block';
            syncCode = Math.random().toString(36).substring(2,5).toUpperCase();
            document.getElementById('sync-code').innerText = syncCode;

            // Logica Pollo
            if(!input.value.includes("🐔") || (input.value.match(/\*/g)||[]).length < 3) hp -= 5;
            else if(hp < 100) hp += 2;
            document.getElementById('hp').innerText = hp;
            if(hp <= 0) { alert("SISTEMA CRASHATO: Pollo morto."); location.reload(); }

            // Logica Fuoco e Terremoto
            if(input.value.length > 50) fire += 2;
            if(input.value.includes("💧💧💧")) fire = Math.max(0, fire - 15);
            document.getElementById('fire').innerText = fire;
            if(fire > 50) document.getElementById('main-header').classList.add('shake-effect');
            else document.getElementById('main-header').classList.remove('shake-effect');
        }
        update();
    }, 2000);

    input.addEventListener('input', update);
    update();
</script>
</body>
</html>
