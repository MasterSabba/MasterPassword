<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterPassaword - Chaos Edition</title>
    <style>
        :root {
            --bg: #08080a;
            --card: #121217;
            --accent: #00f2ff;
            --error: #ff2a6d;
            --success: #05ffa1;
            --text: #e0e0e5;
            --exit-gray: #4a4a4a; /* Grigio per il pulsante */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* STILE PER IL PULSANTE DI USCITA */
        .exit-button {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 35px;
            height: 35px;
            border: 1px solid var(--exit-gray);
            color: var(--exit-gray);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border-radius: 6px;
            transition: 0.3s;
            z-index: 2000;
            cursor: pointer;
        }

        .exit-button:hover {
            color: #ccc;
            border-color: #ccc;
            background: rgba(255, 255, 255, 0.05);
        }

        .header-box {
            position: sticky;
            top: 10px;
            z-index: 1000;
            width: 100%;
            max-width: 700px;
            background: rgba(18, 18, 23, 0.9);
            backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            margin-bottom: 30px;
        }

        h1 {
            text-align: center;
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            border-radius: 8px;
            color: var(--success);
            font-size: 1.3rem;
            padding: 15px;
            box-sizing: border-box;
            outline: none;
            resize: none;
        }

        .stats { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem; color: #666; }

        #rules-container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px;
        }

        .rule {
            padding: 20px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid #222;
            transition: all 0.3s ease;
        }

        .rule.invalid { order: -1; border-color: var(--error); background: rgba(255, 42, 109, 0.05); }
        .rule.valid { border-color: var(--success); opacity: 0.3; transform: scale(0.97); }

        .visual-challenge {
            margin-top: 15px;
            padding: 15px;
            background: #000;
            border: 1px dashed var(--accent);
            border-radius: 8px;
            text-align: center;
        }

        .visual-icon { font-size: 3.5rem; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <a href="https://mastersabba.github.io/MasterSabba/" class="exit-button">×</a>

    <div class="header-box">
        <h1>MASTER PASSAWORD</h1>
        <textarea id="pwd-input" placeholder="Componi la chiave..." rows="2"></textarea>
        <div class="stats">
            <span>SBLOCCATE: <b id="lvl">1</b>/100</span>
            <span>SOMMA: <b id="sum">0</b>/25</span>
        </div>
    </div>

    <div id="rules-container"></div>

<script>
    const input = document.getElementById('pwd-input');
    const container = document.getElementById('rules-container');
    const lvlDisp = document.getElementById('lvl');
    const sumDisp = document.getElementById('sum');

    const getSum = (s) => (s.match(/\d/g) || []).reduce((a, b) => a + Number(b), 0);

    const rules = [
        { t: "La password deve contenere almeno 10 caratteri.", v: p => p.length >= 10 },
        { t: "Includi un numero dispari.", v: p => /[13579]/.test(p) },
        { t: "La somma dei numeri deve essere esattamente 25.", v: p => getSum(p) === 25 },
        { t: "Includi un mese dell'anno (es. Aprile).", v: p => /gennaio|febbraio|marzo|aprile|maggio|giugno|luglio|agosto|settembre|ottobre|novembre|dicembre/i.test(p) },
        { t: "SFIDA VISIVA: Digita il tema di questi simboli.", v: p => /pianet|spazio|astron/i.test(p), isVisual: true, icon: "🪐🚀🌑", hint: "Viene da lontano..." },
        { t: "Includi un numero romano (I, V, X...).", v: p => /[IVXLCDM]/.test(p) },
        { t: "Deve contenere la parola 'Sabba'.", v: p => p.toLowerCase().includes('sabba') },
        { t: "Includi un codice colore HEX (es. #00ff00).", v: p => /#[0-9A-Fa-f]{6}/.test(p) },
        { t: "Inserisci l'emoji del tuo segno zodiacale (es. ♈, ♌).", v: p => /[\u2648-\u2653]/.test(p) || /♈|♉|♊|♋|♌|♍|♎|♏|♐|♑|♒|♓/.test(p) },
        { t: "SFIDA VISIVA: Cosa sono?", v: p => /animal|natur|giungla/i.test(p), isVisual: true, icon: "🦁🐯🐍", hint: "Vivono liberi..." },
        { t: "Includi un elemento chimico (es: He, Fe).", v: p => /H|He|Li|Be|B|C|N|O|F|Ne|Na|Mg|Al|Si|P|S|Cl|Ar|K|Ca|Fe|Au|Ag/i.test(p) },
        { t: "Deve contenere l'indirizzo mastersabba.github.io.", v: p => p.includes("mastersabba.github.io") },
        { t: "La password deve finire con un punto interrogativo (?).", v: p => p.endsWith('?') }
    ];

    for(let i = 14; i <= 100; i++) {
        if (i % 12 === 0) {
            rules.push({ t: "SFIDA VISIVA: Tema musicale.", v: p => /music|band|strument/i.test(p), isVisual: true, icon: "🎸🎹🥁", hint: "Crea suoni..." });
        } else if (i % 5 === 0) {
            rules.push({ t: `Inserisci il numero magico ${i * 9}.`, v: p => p.includes((i * 9).toString()) });
        } else if (i % 3 === 0) {
            let char = String.fromCharCode(65 + (i % 26));
            rules.push({ t: `Inserisci almeno ${Math.floor(i/30)+1} volte la lettera '${char}'.`, v: p => (p.match(new RegExp(char, 'g'))||[]).length >= Math.floor(i/30)+1 });
        } else {
            rules.push({ t: `Deve contenere la parola cifrata '${btoa(i).substring(0,3)}'.`, v: p => p.includes(btoa(i).substring(0,3)) });
        }
    }

    let level = 1;

    function refresh() {
        const val = input.value;
        const currentSum = getSum(val);
        sumDisp.innerText = currentSum;
        sumDisp.style.color = currentSum === 25 ? "var(--success)" : "var(--error)";
        
        let html = "";
        let checkProgress = true;

        for (let i = 0; i < level; i++) {
            const rule = rules[i];
            const ok = rule.v(val);
            if(!ok) checkProgress = false;

            html += `
                <div class="rule ${ok ? 'valid' : 'invalid'}">
                    <div style="font-size:0.7rem; color:#555; margin-bottom:5px;">REGOLA ${i+1}</div>
                    <div class="rule-text">${rule.t}</div>
                    ${rule.isVisual && !ok ? `
                        <div class="visual-challenge">
                            <span class="visual-icon">${rule.icon}</span>
                            <div style="font-size:0.8rem; color:#888">${rule.hint}</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        container.innerHTML = html;
        lvlDisp.innerText = level;

        if(checkProgress && level < rules.length) {
            level++;
            refresh();
        }
    }

    input.addEventListener('input', refresh);
    refresh();
</script>
</body>
</html>
