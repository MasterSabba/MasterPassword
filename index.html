<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterPassaword - Extreme Chaos</title>
    <style>
        :root {
            --bg: #08080a;
            --card: #121217;
            --accent: #00f2ff;
            --error: #ff2a6d;
            --success: #05ffa1;
            --text: #e0e0e5;
        }

        body {
            <a href="https://mastersabba.github.io/MasterSabba/" class="exit-button">×</a>
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .header-box {
            position: sticky;
            top: 10px;
            z-index: 1000;
            width: 100%;
            max-width: 700px;
            background: rgba(18, 18, 23, 0.9);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            margin-bottom: 30px;
        }

        h1 {
            text-align: center;
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            border-radius: 8px;
            color: var(--success);
            font-size: 1.3rem;
            padding: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .stats { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem; color: #666; }

        #rules-container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .rule {
            padding: 20px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid #222;
            transition: all 0.3s ease;
        }

        .rule.invalid { order: -1; border-color: var(--error); background: rgba(255, 42, 109, 0.05); }
        .rule.valid { border-color: var(--success); opacity: 0.3; transform: scale(0.97); }

        .rule-num { font-size: 0.7rem; color: #555; margin-bottom: 5px; }
        .rule-text { font-size: 1.1rem; line-height: 1.4; }

        .visual-challenge {
            margin-top: 15px;
            padding: 15px;
            background: #000;
            border: 1px dashed var(--accent);
            border-radius: 8px;
            text-align: center;
        }

        .visual-icon { font-size: 3.5rem; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>MASTER PASSAWORD</h1>
        <textarea id="pwd-input" placeholder="Componi la chiave..." rows="2"></textarea>
        <div class="stats">
            <span>LIVELLO: <b id="lvl">0</b>/100</span>
            <span>SOMMA: <b id="sum">0</b>/25</span>
        </div>
    </div>

    <div id="rules-container"></div>

<script>
    const input = document.getElementById('pwd-input');
    const container = document.getElementById('rules-container');
    const lvlDisp = document.getElementById('lvl');
    const sumDisp = document.getElementById('sum');

    const getSum = (s) => (s.match(/\d/g) || []).reduce((a, b) => a + Number(b), 0);

    // REGOLE DINAMICHE E FLESSIBILI
    const rules = [
        { t: "Almeno 10 caratteri.", v: p => p.length >= 10 },
        { t: "Includi un numero.", v: p => /\d/.test(p) },
        { t: "Includi una maiuscola.", v: p => /[A-Z]/.test(p) },
        { t: "Includi un carattere speciale.", v: p => /[^A-Za-z0-9]/.test(p) },
        { t: "La somma dei numeri deve essere 25.", v: p => getSum(p) === 25 },
        { t: "Includi un mese dell'anno.", v: p => /gennaio|febbraio|marzo|aprile|maggio|giugno|luglio|agosto|settembre|ottobre|novembre|dicembre/i.test(p) },
        { t: "Includi un numero romano.", v: p => /[IVXLCDM]/.test(p) },
        { t: "Includi un elemento della tavola periodica.", v: p => /H|He|Li|Be|B|C|N|O|F|Ne|Na|Mg|Al|Si|P|S|Cl|Ar|K|Ca|Fe|Au|Ag/i.test(p) },
        { t: "Includi la parola 'Sabba'.", v: p => p.toLowerCase().includes('sabba') },
        { t: "Includi un qualsiasi codice colore HEX (es. #00ff00).", v: p => /#[0-9A-Fa-f]{6}/.test(p) },
        { t: "Inserisci l'emoji del tuo segno zodiacale (es. ♈, ♌, ♏).", v: p => /[\u2648-\u2653]/.test(p) || /♈|♉| Gemini|♋|♌|♍|♎|♏|♐|♑|♒|♓/.test(p) },
        { t: "SFIDA VISIVA: Cosa sono questi?", v: p => /pianet|astron|spazio/i.test(p), isVisual: true, icon: "🪐🚀🌑", hint: "Tema spaziale..." },
        { t: "Deve contenere un linguaggio di programmazione.", v: p => /python|java|javascript|cpp|html|css|php|ruby|swift/i.test(p) },
        { t: "Deve contenere un'estensione di file (es. .zip, .png).", v: p => /\.(zip|png|jpg|pdf|exe|mp4)/i.test(p) },
        { t: "Deve contenere una provincia italiana (MI, RM, NA...).", v: p => /MI|RM|NA|TO|FI|PA|BO|GE|BA|VR/i.test(p) },
        { t: "La password deve finire con un punto interrogativo.", v: p => p.endsWith('?') }
    ];

    // Generatore di 100 regole (mix di sfide imprevedibili)
    for(let i = 17; i <= 100; i++) {
        if (i % 8 === 0) {
            rules.push({ t: "SFIDA VISIVA: Digita l'oggetto principale.", v: p => /fuoco|fiamma|caldo/i.test(p), isVisual: true, icon: "🔥🧨🌋", hint: "Brucia..." });
        } else if (i % 5 === 0) {
            let target = i * 4;
            rules.push({ t: `Inserisci il numero magico ${target}.`, v: p => p.includes(target.toString()) });
        } else if (i % 3 === 0) {
            let char = String.fromCharCode(65 + (i % 26));
            rules.push({ t: `La password deve avere almeno ${Math.floor(i/20)+1} '${char}'.`, v: p => (p.match(new RegExp(char, 'g'))||[]).length >= Math.floor(i/20)+1 });
        } else {
            rules.push({ t: `Deve contenere la parola '${btoa(i).substring(0,3)}' (case sensitive).`, v: p => p.includes(btoa(i).substring(0,3)) });
        }
    }

    let level = 1;

    function render() {
        const val = input.value;
        const currentSum = getSum(val);
        sumDisp.innerText = currentSum;
        sumDisp.style.color = currentSum === 25 ? "var(--success)" : "var(--error)";
        
        let html = "";
        let allValid = true;

        for (let i = 0; i < level; i++) {
            const rule = rules[i];
            const ok = rule.v(val);
            if(!ok) allOk = false;

            html += `
                <div class="rule ${ok ? 'valid' : 'invalid'}">
                    <div class="rule-num">REGOLA ${i+1}</div>
                    <div class="rule-text">${rule.t}</div>
                    ${rule.isVisual && !ok ? `
                        <div class="visual-challenge">
                            <span class="visual-icon">${rule.icon}</span>
                            <div style="font-size:0.8rem; color:#888">${rule.hint}</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        container.innerHTML = html;
        lvlDisp.innerText = level;

        // Logica di avanzamento automatica
        let checkValidUntilNow = true;
        for(let j=0; j<level; j++) { if(!rules[j].v(val)) checkValidUntilNow = false; }

        if(checkValidUntilNow && level < rules.length) {
            level++;
            render();
        }
    }

    input.addEventListener('input', render);
    render();
</script>
</body>
</html>
